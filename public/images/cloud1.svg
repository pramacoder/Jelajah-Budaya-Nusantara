<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
    </filter>
    <filter id="softEdge" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <radialGradient id="cloudGrad" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#f5f5f5" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#eeeeee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Main cloud body -->
  <ellipse cx="400" cy="200" rx="360" ry="90" fill="url(#cloudGrad)" filter="url(#softEdge)"/>
  <!-- Puffs -->
  <circle cx="200" cy="185" r="85" fill="white" filter="url(#softEdge)" opacity="0.95"/>
  <circle cx="310" cy="155" r="100" fill="white" filter="url(#softEdge)" opacity="0.98"/>
  <circle cx="430" cy="145" r="110" fill="white" filter="url(#softEdge)"/>
  <circle cx="550" cy="165" r="90" fill="white" filter="url(#softEdge)" opacity="0.97"/>
  <circle cx="640" cy="185" r="75" fill="white" filter="url(#softEdge)" opacity="0.96"/>
  <!-- Small top puffs -->
  <circle cx="380" cy="120" r="70" fill="white" filter="url(#softEdge)"/>
  <circle cx="290" cy="135" r="55" fill="white" filter="url(#blur1)" opacity="0.9"/>
  <circle cx="480" cy="130" r="60" fill="white" filter="url(#blur1)" opacity="0.92"/>
</svg>
